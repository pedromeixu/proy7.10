<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head> 
    <th:block th:insert="~{fragment.html :: cabecera}"></th:block> 
    <title>MyApp - Nueva Cuenta</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/tables.css">
    <link rel="stylesheet" href="/css/layout.css">
</head>

<body>

<div class="container">
    <div class="row justify-content-center">

        <h1>Nueva cuenta</h1>

        <form method="post" action="#" th:action="@{/cuentas/new/submit}" th:object="${cuentaForm}">
            
            <label>Iban:</label>
            <input type="text" id="iban" th:field="*{iban}" />

            <label>Alias:</label>
            <input type="text" id="alias" th:field="*{alias}" />

            <!-- Saldo oculto -->
            <!-- <label>Saldo:<input type="text" id="saldo" th:field="*{saldo}" /></label> -->

            <input class="btn-primary" type="submit" value="Enviar" />
        </form>

    </div>
</div>

</body>
</html>
