<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Usuarios</title>
</head>
<body>

<h2>Usuarios</h2>

<a th:href="@{/usuarios/new}">Nuevo Usuario</a>
<br/><br/>

<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Rol</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="u : ${listaUsuarios}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.nombre}"></td>
            <td th:text="${u.rol}"></td>
            <td>
                <a th:href="@{'/usuarios/edit/' + ${u.id}}">Editar</a>
                |
                <a th:href="@{'/usuarios/delete/' + ${u.id}}"
                   onclick="return confirm('¿Seguro que deseas eliminar este usuario?')">
                   Eliminar
                </a>
            </td>
        </tr>
    </tbody>
</table>

</body>
</html>
