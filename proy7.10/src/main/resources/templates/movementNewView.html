<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head> 
    <th:block th:insert="~{fragment.html :: cabecera}"></th:block> 
    <title>MyApp - Nuevo Movimiento</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/tables.css">
    <link rel="stylesheet" href="/css/layout.css">
</head>

<body>

    <h1>Nuevo movimiento</h1>

    <form method="post" action="#" th:action="@{/movimientos/new/submit}" th:object="${movimientoForm}">
        
        <input type="hidden" th:field="*{cuenta}" />

        <label>Importe:</label>
        <input type="text" id="importe" th:field="*{importe}" />

        <input class="btn-primary" type="submit" value="Enviar" />
    </form>

</body>
</html>
